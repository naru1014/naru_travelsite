<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>旅行比較サイト｜パスワード</title>
<style>
:root{--navy:#0b1e33;--deep:#06131f;--gold:#c9a35c;--gold2:#e8cc86;--cream:#f7f1e5;--paper:#fffaf2;--white:#fff;--ink:#1b2530;--muted:#687382;--line:rgba(201,163,92,.28);--shadow:0 32px 90px rgba(6,22,38,.22);--radius:30px;}
*{box-sizing:border-box}html{-webkit-text-size-adjust:100%;}body{margin:0;min-height:100vh;display:grid;place-items:center;padding:22px;font-family:"Hiragino Mincho ProN","Yu Mincho",serif;background:radial-gradient(circle at top left,rgba(232,204,134,.42),transparent 34%),linear-gradient(135deg,var(--deep),var(--navy));color:var(--ink);}
.card{width:min(480px,100%);padding:38px 34px;border-radius:30px;background:rgba(255,250,242,.96);box-shadow:var(--shadow);border:1px solid rgba(232,204,134,.35);text-align:center;}
.kicker{color:var(--gold);font-weight:900;letter-spacing:.18em;font-size:.78rem;margin-bottom:14px;}h1{margin:0;color:var(--navy);font-size:clamp(2rem,8vw,3.2rem);letter-spacing:.06em;}p{color:#4b5563;line-height:1.8;margin:14px 0 26px;}label{display:block;text-align:left;font-weight:800;color:var(--navy);margin-bottom:8px;}input{width:100%;min-height:52px;border:1px solid rgba(11,30,51,.18);border-radius:18px;background:#fff;padding:0 16px;font-size:1.05rem;outline:none;transition:.2s;}
input:focus{border-color:var(--gold);box-shadow:0 0 0 4px rgba(201,163,92,.18);}button{width:100%;min-height:52px;margin-top:16px;border:0;border-radius:999px;background:linear-gradient(135deg,var(--gold),var(--gold2));color:var(--deep);font-weight:900;font-size:1rem;cursor:pointer;box-shadow:0 14px 32px rgba(6,22,38,.18);}button:active{transform:translateY(1px)}.msg{min-height:1.5em;margin-top:14px;color:#b42318;font-weight:800;}
@media(max-width:540px){body{padding:14px}.card{padding:30px 20px;border-radius:24px}input,button{min-height:50px}.kicker{font-size:.72rem}}
</style>
</head>
<body>
  <main class="card">
    <div class="kicker">TRAVEL COMPARISON</div>
    <h1>パスワード</h1>
    <p>旅行サイトを見るにはパスワードを入力してください。</p>
    <form id="loginForm">
      <label for="passwordInput">Password</label>
      <input id="passwordInput" type="password" autocomplete="current-password" placeholder="パスワードを入力">
      <button type="submit">サイトに入る</button>
      <div class="msg" id="message" aria-live="polite"></div>
    </form>
  </main>
<script>
const SITE_PASSWORD = "ryoma1014";
const TARGET_PAGE = "index.html";
document.getElementById("loginForm").addEventListener("submit", function(e){
  e.preventDefault();
  const input = document.getElementById("passwordInput");
  const message = document.getElementById("message");
  if(input.value === SITE_PASSWORD){
    sessionStorage.setItem("travelSiteUnlocked", "true");
    location.href = TARGET_PAGE;
  }else{
    message.textContent = "パスワードが違います。";
    input.focus();
    input.select();
  }
});
</script>
</body>
</html>
